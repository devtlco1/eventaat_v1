# Optional local services for development (PostgreSQL, Redis). Not required for the empty Prisma
# schema beyond connection checks; start before `pnpm dev:api` if you use a real DATABASE_URL.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eventaat
      POSTGRES_PASSWORD: eventaat
      POSTGRES_DB: eventaat
    ports:
      - "5432:5432"
    volumes:
      - eventaat-pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  eventaat-pgdata:
